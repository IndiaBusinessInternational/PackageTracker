<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBI Database</title>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --border: #e2e8f0;
            --primary: #2563eb; --primary-hover: #1d4ed8; --accent: #10b981;
            --dropzone-bg: #eff6ff; --dropzone-border: #93c5fd;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --border: #334155;
            --primary: #3b82f6; --primary-hover: #2563eb; --accent: #059669;
            --dropzone-bg: #0f172a; --dropzone-border: #475569;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        .container { width: 100%; max-width: 800px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card { background-color: var(--surface); border-radius: 16px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid var(--border); margin-bottom: 20px;}
        
        .dropzone { border: 2px dashed var(--dropzone-border); background-color: var(--dropzone-bg); border-radius: 12px; padding: 30px 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; position: relative;}
        .dropzone.dragover { border-color: var(--primary); background-color: rgba(59, 130, 246, 0.1); transform: scale(1.02); }
        .dropzone p { margin: 0; font-size: 16px; font-weight: 600; color: var(--text); opacity: 0.8; }
        .ai-badge { position: absolute; top: 10px; right: 10px; background: linear-gradient(135deg, #a855f7, #3b82f6); color: white; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold;}
        
        .section-title { font-size: 14px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 15px 0; border-bottom: 2px solid var(--border); padding-bottom: 5px;}
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.col-span-2 { grid-column: span 2; }
        .form-group.col-span-3 { grid-column: span 3; }
        
        label { margin-bottom: 6px; font-size: 12px; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg); color: var(--text); font-size: 14px; font-weight: 500; outline: none; transition: border-color 0.2s; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }
        textarea { resize: vertical; min-height: 70px; }

        button.submit-btn { width: 100%; padding: 18px; font-size: 16px; font-weight: bold; color: white; background-color: var(--accent); border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s; margin-top: 30px; }
        button.submit-btn:hover { opacity: 0.9; }
        button.submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        #status { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; display: none; }
        .status-success { background-color: #dcfce7; color: #166534; display: block !important; }
        .status-error { background-color: #fee2e2; color: #991b1b; display: block !important; }
        .status-info { background-color: #e0f2fe; color: #0369a1; display: block !important; }
        .status-gemini { background-color: #f3e8ff; color: #7e22ce; display: block !important; border: 1px solid #d8b4fe; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 style="margin:0; font-size: 24px;">IBI Database</h2>
            <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
        </div>

        <div class="card">
            <div class="dropzone" id="dropzone">
                <span class="ai-badge">✨ Gemini AI Powered</span>
                <p>📄 Drag & Drop Invoice/Label PDF Here</p>
                <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
            </div>
            <div id="status"></div>

            <div class="section-title">1. Order Information</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Platform</label>
                    <select id="platform">
                        <option value="Unknown">-- Select --</option>
                        <option value="Amazon">Amazon</option>
                        <option value="Amazon Bazaar">Amazon Bazaar</option>
                        <option value="Flipkart">Flipkart</option>
                        <option value="Shopsy">Shopsy</option>
                        <option value="Meesho">Meesho</option>
                        <option value="ShopClues">ShopClues</option>
                        <option value="IBI Website">IBI Website</option>
                    </select>
                </div>
                <div class="form-group"><label>Order ID</label><input type="text" id="orderId"></div>
                <div class="form-group"><label>Invoice Number</label><input type="text" id="invoiceNumber"></div>
                <div class="form-group"><label>Invoice Date</label><input type="text" id="invoiceDate" placeholder="DD/MM/YYYY"></div>
                <div class="form-group"><label>Order Date</label><input type="text" id="orderDate" placeholder="DD/MM/YYYY"></div>
                <div class="form-group"><label>Ship Date</label><input type="text" id="shipDate" placeholder="DD/MM/YYYY"></div>
            </div>

            <div class="section-title">2. Customer Details</div>
            <div class="form-grid">
                <div class="form-group col-span-2"><label>Buyer Name</label><input type="text" id="buyerName"></div>
                <div class="form-group"><label>Phone Number</label><input type="text" id="phone"></div>
                <div class="form-group col-span-3"><label>Shipping Address</label><textarea id="shippingAddr"></textarea></div>
                <div class="form-group col-span-2"><label>Billing Address</label><textarea id="billingAddr"></textarea></div>
                <div class="form-group"><label>Pincode</label><input type="text" id="pincode"></div>
            </div>

            <div class="section-title">3. Logistics & Tracking</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Courier Service</label>
                    <select id="courier">
                        <option value="Unknown">-- Select Courier --</option>
                        <option value="Amazon ATS">Amazon ATS</option>
                        <option value="eKart">eKart</option>
                        <option value="Delhivery">Delhivery</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group col-span-2"><label>AWB / Tracking Number</label><input type="text" id="awb"></div>
                <div class="form-group">
                    <label>Package Status</label>
                    <select id="packageStatus">
                        <option value="Processing">Processing</option>
                        <option value="Dispatched">Dispatched</option>
                        <option value="In Transit">In Transit</option>
                        <option value="Delivered">Delivered</option>
                        <option value="RTO Initiated">RTO Initiated</option>
                        <option value="Returned to Seller">Returned to Seller</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Payment Type</label>
                    <select id="paymentType">
                        <option value="COD">COD</option>
                        <option value="Prepaid">Prepaid</option>
                    </select>
                </div>
                <div class="form-group"><label>Total Amount (₹)</label><input type="number" id="totalAmount"></div>
                <div class="form-group col-span-2"><label>Product(s) Purchased / SKU</label><textarea id="products"></textarea></div>
                <div class="form-group"><label>Total Quantity</label><input type="number" id="qty"></div>
                <div class="form-group">
                    <label>Fraud / Flag Reason</label>
                    <select id="fraudReason">
                        <option value="None">None / Safe Buyer</option>
                        <option value="High Risk RTO">High Risk RTO (Rejected)</option>
                        <option value="Fake Address">Fake / Invalid Address</option>
                        <option value="Empty Box Return">Empty Box / Fraud Return</option>
                        <option value="Used Item Return">Used / Damaged Return</option>
                    </select>
                </div>
            </div>

            <button class="submit-btn" id="submitBtn" onclick="submitData()">Save / Update Database Record</button>
        </div>
    </div>

    <script>
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') { document.body.setAttribute('data-theme', 'dark'); document.getElementById('themeBtn').innerText = '☀️ Light'; }
        function toggleTheme() {
            if (document.body.getAttribute('data-theme') === 'dark') { document.body.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); document.getElementById('themeBtn').innerText = '🌙 Dark'; } 
            else { document.body.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); document.getElementById('themeBtn').innerText = '☀️ Light'; }
        }

        function showStatus(msg, className) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = msg; statusDiv.className = className;
            if(className !== 'status-info' && className !== 'status-gemini') setTimeout(() => { statusDiv.style.display = 'none'; }, 6000);
        }

        // ⚠️ PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyzgWeF13ZjmDFiXOMDxbrG_AfHZNDKKCH3RfQM9diHmN6g1W_givsr9q95bB-Nl5J4-w/exec';

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

        function handleFile(file) {
            if (file.type !== 'application/pdf') { alert('Please upload a PDF file.'); return; }
            showStatus('✨ Sending PDF to Gemini AI for analysis...', 'status-gemini');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Pdf = e.target.result.split(',')[1];
                extractWithGemini(base64Pdf);
            };
            reader.readAsDataURL(file);
        }

        function extractWithGemini(base64Pdf) {
            const formData = new FormData();
            formData.append('action', 'extract');
            formData.append('pdfData', base64Pdf);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const parsed = data.data;
                        document.getElementById('platform').value = parsed.platform || 'Unknown';
                        document.getElementById('orderId').value = parsed.orderId || '';
                        document.getElementById('invoiceNumber').value = parsed.invoiceNumber || '';
                        document.getElementById('invoiceDate').value = parsed.invoiceDate || '';
                        document.getElementById('orderDate').value = parsed.orderDate || '';
                        document.getElementById('shipDate').value = parsed.shipDate || '';
                        document.getElementById('buyerName').value = parsed.buyerName || '';
                        document.getElementById('phone').value = parsed.phone || '';
                        document.getElementById('shippingAddr').value = parsed.shippingAddr || '';
                        document.getElementById('billingAddr').value = parsed.billingAddr || '';
                        document.getElementById('pincode').value = parsed.pincode || '';
                        document.getElementById('awb').value = parsed.awb || '';
                        document.getElementById('products').value = parsed.products || '';
                        document.getElementById('qty').value = parsed.qty || '';
                        document.getElementById('totalAmount').value = parsed.totalAmount || '';
                        
                        if (parsed.paymentType) document.getElementById('paymentType').value = parsed.paymentType.includes('Prepaid') ? 'Prepaid' : 'COD';
                        
                        // Auto-select courier based on Platform if possible
                        const plat = document.getElementById('platform').value;
                        if (plat === 'Amazon' || plat === 'Amazon Bazaar') document.getElementById('courier').value = 'Amazon ATS';
                        else if (plat === 'Flipkart' || plat === 'Shopsy') document.getElementById('courier').value = 'eKart';
                        else if (plat === 'Meesho' || plat === 'ShopClues' || plat === 'IBI Website') document.getElementById('courier').value = 'Delhivery';

                        showStatus('✅ Gemini AI successfully extracted data. Please review before saving!', 'status-success');
                    } else showStatus('Error: ' + data.message, 'status-error');
                }).catch(error => showStatus('Network error while communicating with AI.', 'status-error'));
        }

        function submitData() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Connecting to Database...";
            
            const formData = new FormData();
            formData.append('action', 'save');
            formData.append('platform', document.getElementById('platform').value);
            formData.append('orderId', document.getElementById('orderId').value);
            formData.append('invoiceNumber', document.getElementById('invoiceNumber').value);
            formData.append('invoiceDate', document.getElementById('invoiceDate').value);
            formData.append('orderDate', document.getElementById('orderDate').value);
            formData.append('shipDate', document.getElementById('shipDate').value);
            formData.append('awb', document.getElementById('awb').value);
            formData.append('buyerName', document.getElementById('buyerName').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('pincode', document.getElementById('pincode').value);
            formData.append('billingAddr', document.getElementById('billingAddr').value);
            formData.append('shippingAddr', document.getElementById('shippingAddr').value);
            formData.append('products', document.getElementById('products').value);
            formData.append('qty', document.getElementById('qty').value);
            formData.append('totalAmount', document.getElementById('totalAmount').value);
            formData.append('paymentType', document.getElementById('paymentType').value);
            formData.append('fraudReason', document.getElementById('fraudReason').value);
            formData.append('courier', document.getElementById('courier').value);
            formData.append('packageStatus', document.getElementById('packageStatus').value);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        if (data.type === 'updated') {
                            showStatus('🔄 Existing Record Updated Successfully!', 'status-success');
                        } else {
                            showStatus('✅ New Record Added Successfully!', 'status-success');
                        }
                        // Clear form after a delay so they can see the message
                        setTimeout(() => {
                            document.querySelectorAll('input, textarea').forEach(input => input.value = ''); 
                            document.getElementById('platform').value = 'Unknown';
                            document.getElementById('courier').value = 'Unknown';
                            document.getElementById('packageStatus').value = 'Processing';
                            document.getElementById('fraudReason').value = 'None';
                        }, 2000);
                    } else showStatus('Error: ' + data.message, 'status-error');
                    btn.disabled = false; btn.innerText = "Save / Update Database Record";
                }).catch(error => {
                    showStatus('Network error. Try again.', 'status-error');
                    btn.disabled = false; btn.innerText = "Save / Update Database Record";
                });
        }
    </script>
</body>
</html>
